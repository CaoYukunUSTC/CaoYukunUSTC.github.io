<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to new homepage...</title>
    <!-- 核心：Meta 刷新重定向，0秒后跳转到新网址 -->
    <meta http-equiv="refresh" content="0; url=https://caoyukun98.github.io/">
    <!-- 核心：JavaScript 重定向（速度更快） -->
    <script type="text/javascript">
        window.location.replace("https://caoyukun98.github.io/");
    </script>
</head>
<body>
    <!-- 给不支持 JS 或 Meta 跳转的远古浏览器留个后路 -->
    <p>正在跳转到新主页... 如果没有自动跳转，请点击 <a href="https://caoyukun98.github.io/">此处</a>。</p>
</body>
</html>
